<!-- src/app/app.component.html -->

<div class="container">
  <h2>Add a Course</h2>
  
  <!-- Form to submit course name -->
  <form (submit)="addCourse(); $event.preventDefault()">
    <div class="form-group">
      <label for="courseName">Course Name:</label>
      <input type="text" id="courseName" [(ngModel)]="courseName" name="courseName" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-primary">Add Course</button>
  </form>

  <!-- Display message after adding a course -->
  <div *ngIf="message" class="alert alert-info" style="margin-top: 20px;">
    {{ message }}
  </div>

  <h2>Available Courses</h2>

  <!-- Display the list of courses -->
  <ul *ngIf="courses.length > 0" class="list-group">
    <li *ngFor="let course of courses" class="list-group-item">
      <strong>{{ course[1] }}</strong> - {{ course[2] }} <!-- Display course name and description -->
    </li>
  </ul>

  <!-- If no courses are available -->
  <p *ngIf="courses.length === 0">No courses available.</p>
</div>
